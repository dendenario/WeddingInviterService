name: Deploy Spring Boot to Yandex Serverless

on:
  push:
    branches:
      - master # Скрипт сработает автоматически при пуше в ветку main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. Скачиваем код вашего проекта из GitHub
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Устанавливаем Java
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven' # Кэширует зависимости, чтобы сборка шла быстрее

      # 3. Собираем JAR-файл проекта через Maven (пропуская тесты для скорости)
      - name: Build with Maven
        run: ./mvnw clean package -DskipTests

      # 4. Авторизуемся в Yandex Cloud Container Registry
      - name: Yandex Cloud Registry Login
        uses: yc-actions/yc-cr-login@v2
        with:
          yc-sa-json-credentials: ${{ secrets.YC_SA_KEY }}

      # 5. Собираем Docker-образ из вашего Dockerfile и пушим его в созданный Registry
      - name: Build and Push Docker Image
        run: |
          IMAGE_NAME=cr.yandex/${{ secrets.YC_REGISTRY_ID }}/spring-app:${{ github.sha }}
          docker build -t $IMAGE_NAME .
          docker push $IMAGE_NAME
          echo "IMAGE_NAME=$IMAGE_NAME" >> $GITHUB_ENV

      # 6. Создаем (если нет) или обновляем Serverless Container в Yandex Cloud
      - name: Deploy Serverless Container
        uses: yc-actions/yc-sls-container-deploy@v2
        with:
          yc-sa-json-credentials: ${{ secrets.YC_SA_KEY }}
          container-name: "spring-thymeleaf-app"
          image: cr.yandex/${{ secrets.YC_REGISTRY_ID }}/spring-app:${{ github.sha }}
          cores: 1
          core-fraction: 5
          memory: "2GB"
          # Передаем переменные окружения внутрь контейнера Яндекса
          environment: |
            PORT=8080
            SPRING_PROFILES_ACTIVE=prod 
            APP_SECURITY_USERNAME=${{ secrets.APP_SECURITY_USERNAME }}
            APP_SECURITY_PASSWORD=${{ secrets.APP_SECURITY_PASSWORD }}
            YDB_SERVICE_ACCOUNT_KEY_FILE_CREDENTIALS=${{ secrets.YC_YDB_SA_KEY }}
            YDB_URL=${{ secrets.YC_YDB_URL }}