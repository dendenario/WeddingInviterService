<!DOCTYPE html>
<html xmlns:th="http://thymeleaf.org" lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Панель организатора — Денис и Мария</title>
    <link rel="preconnect" href="https://googleapis.com">
    <link rel="preconnect" href="https://gstatic.com" crossorigin>
    <link href="https://googleapis.com/css2?family=Montserrat:wght@300;400;500;600&family=Playfair+Display:wght@400;600&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg-color: #fbf5f5;
            --primary-pink: #fbcbc9;
            --primary-green: #d1e2d3;
            --text-brown: #5c4a43;
            --card-bg: #ffffff;
        }

        /* Общие сбросы и жесткая привязка шрифта */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Montserrat', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-brown);
            line-height: 1.5;
            padding: 40px 20px;
        }

        .admin-container {
            max-width: 1000px;
            margin: 0 auto;
            background: var(--card-bg);
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(92, 74, 67, 0.05);
            border: 2px solid var(--primary-pink);
        }

        /* Заголовки используют свадебный Playfair Display */
        h1 {
            font-family: 'Playfair Display', serif;
            font-size: 32px; /* Фиксированный размер */
            font-weight: 400;
            margin-bottom: 30px;
            text-align: center;
        }

        /* Карточки статистики */
        .stats-grid {
            display: flex;
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            flex: 1;
            background: var(--bg-color);
            padding: 20px;
            border-radius: 8px;
            text-align: center;
            border: 1px solid var(--primary-green);
        }

        .stat-card h4 {
            font-size: 13px; /* Фиксированный размер */
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 8px;
            color: var(--text-brown);
            opacity: 0.8;
        }

        .stat-card p {
            font-family: 'Playfair Display', serif;
            font-size: 36px; /* Фиксированный размер */
            font-weight: 600;
        }

        /* Таблица гостей */
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
            background: var(--card-bg);
        }

        th, td {
            padding: 14px 16px;
            text-align: left;
            border-bottom: 1px solid #eee;
            font-size: 14px; /* Фиксированный размер для всей таблицы */
        }

        th {
            background-color: var(--primary-green);
            font-weight: 600;
            color: var(--text-brown);
            text-transform: uppercase;
            font-size: 12px;
            letter-spacing: 0.5px;
        }

        td {
            color: var(--text-brown);
        }

        tr:hover {
            background-color: #fbf9f9;
        }

        /* Баджи */
        .badge {
            padding: 4px 10px;
            border-radius: 6px;
            font-size: 12px;
            font-weight: 500;
            display: inline-block;
        }

        .badge-success { background-color: #e2f0d9; color: #385723; }
        .badge-danger { background-color: #fce4d6; color: #c65911; }

        .logout-btn {
            display: block;
            width: fit-content;
            margin: 30px auto 0 auto;
            padding: 12px 24px;
            background-color: var(--primary-pink);
            color: var(--text-brown);
            text-decoration: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 500;
            transition: all 0.3s ease;
            box-shadow: 0 4px 10px rgba(251, 203, 201, 0.2);
        }

        .logout-btn:hover {
            background-color: #fca09c;
            transform: translateY(-1px);
        }
    </style>
</head>
<body>

<div class="admin-container">
    <h1>Ответы на приглашения</h1>

    <!-- Блок статистики -->
    <div class="stats-grid">
        <div class="stat-card">
            <h4>Всего придет гостей</h4>
            <p th:text="${totalAttending}">0</p>
        </div>
        <div class="stat-card">
            <h4>Нужен трансфер от Рассказовки</h4>
            <p th:text="${totalShuttle}">0</p>
        </div>
    </div>

    <!-- Новое: Форма редактирования текстовых блоков -->
    <div style="margin-bottom: 40px; padding: 20px; border: 1px dashed var(--primary-pink); border-radius: 8px;">
        <h3 style="font-family: 'Playfair Display', serif; font-size: 20px; margin-bottom: 15px; text-align: left;">Редактирование текстов сайта</h3>
        <form th:action="@{/admin/text/update}" method="post" style="display: flex; flex-direction: column; gap: 15px;">
            <div>
                <label style="font-size: 13px; font-weight: 600; display: block; margin-bottom: 5px;">Текст дресс-кода (поддерживает теги &lt;p&gt;):</label>
                <textarea name="dresscode" th:text="${dresscodeText}" style="width: 100%; min-height: 80px; padding: 10px; border-radius: 6px; border: 1px solid #eee;"></textarea>
            </div>
            <div>
                <label style="font-size: 13px; font-weight: 600; display: block; margin-bottom: 5px;">Список пожеланий (каждый пункт внутри тегов &lt;li&gt;&lt;/li&gt;):</label>
                <textarea name="wishes" th:text="${wishesText}" style="width: 100%; min-height: 100px; padding: 10px; border-radius: 6px; border: 1px solid #eee;"></textarea>
            </div>
            <button type="submit" style="background-color: var(--primary-green); color: var(--text-brown); width: fit-content; padding: 10px 20px; border: none; border-radius: 6px; cursor: pointer; font-weight: 500;">Сохранить изменения</button>
        </form>
    </div>

    <!-- Таблица -->
    <table>
        <thead>
        <tr>
            <th>Имя Гостя</th>
            <th>Присутствие</th>
            <th>Алкоголь</th>
            <th>Трансфер</th>
            <th>Комментарий</th>
        </tr>
        </thead>
        <tbody>
        <!-- Итерация по списку гостей из бэкенда -->
        <tr th:each="guest : ${guests}">
            <td th:text="${guest.name}" style="font-weight: 500;">Иван Иванов</td>
            <td>
                <span th:if="${guest.attending}" class="badge badge-success">Будет</span>
                <span th:unless="${guest.attending}" class="badge badge-danger">Не будет</span>
            </td>
            <td th:text="${guest.alcoholPreference}">Не определено</td>
            <td>
                <span th:if="${guest.shuttleRequired}">Да</span>
                <span th:unless="${guest.shuttleRequired}">—</span>
            </td>
            <td th:text="${guest.commentary}" style="font-size: 0.85rem; max-width: 250px;">-</td>
        </tr>
        <tr th:if="${#lists.isEmpty(guests)}">
            <td colspan="5" style="text-align: center; color: #999;">Ответов пока нет</td>
        </tr>
        </tbody>
    </table>

    <a href="/logout" class="logout-btn">Выйти из панели</a>
</div>

</body>
</html>
