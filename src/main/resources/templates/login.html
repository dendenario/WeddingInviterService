<!DOCTYPE html>
<html xmlns:th="http://thymeleaf.org" lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход на сайт — Денис и Мария</title>

    <link rel="preconnect" href="https://googleapis.com">
    <link rel="preconnect" href="https://gstatic.com" crossorigin>
    <link href="https://googleapis.com/css2?family=Montserrat:wght@400;500;600&display=swap" rel="stylesheet">

    <!-- Подключение единой пастельной дизайн-системы -->
    <link th:href="@{/css/wedding.css}" rel="stylesheet">
</head>
<body>

<!-- Добавлено инлайн-выравнивание текста по центру для всей карточки -->
<div class="login-card reveal-block" style="text-align: center;">

    <h1>Добро пожаловать</h1>
    <p style="margin: 0 auto 25px auto; opacity: 0.8;">на свадебный сайт Дениса и Марии</p>

    <!-- Вывод ошибки, если введен неверный пароль/логин -->
    <div th:if="${param.error}" class="error-msg"
         style="color: #c65911; background-color: #fce4d6; padding: 10px; border-radius: 8px; font-size: 0.85rem; margin: 0 auto 15px auto; max-width: 100%;">
        Неверный логин или пароль.
    </div>

    <!-- Форма отправляет данные на встроенный обработчик Spring Security -->
    <form th:action="@{/login}" method="post">
        <!-- margin: 0 auto 15px auto гарантирует центрирование инпутов внутри контейнера -->
        <div>
            <input type="text" name="username" class="login-input" placeholder="Имя пользователя" required
                   style="display: block; margin: 0 auto 15px auto;">
        </div>
        <div>
            <input type="password" name="password" class="login-input" placeholder="Пароль" required
                   style="display: block; margin: 0 auto 15px auto;">
        </div>
        <button type="submit" style="margin: 5px auto 0 auto; display: inline-block;">Войти</button>
    </form>
</div>

<!-- Скрипт для инициализации плавного появления (Intersection Observer) -->
<script th:src="@{/js/wedding.js}" defer></script>
</body>
</html>
