<!DOCTYPE html>
<html xmlns:th="http://thymeleaf.org" lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход на сайт — Денис и Мария</title>
    <link rel="preconnect" href="https://googleapis.com">
    <link rel="preconnect" href="https://gstatic.com" crossorigin>
    <link href="https://googleapis.com/css2?family=Montserrat:wght@400;500&family=Playfair+Display:wght@400;600&display=swap" rel="stylesheet">
    <link th:href="@{/css/wedding.css}" rel="stylesheet">

    <style>
        .login-card {
            background: var(--card-bg);
            padding: 40px;
            border-radius: 16px;
            max-width: 400px;
            width: 100%;
            text-align: center;
            box-shadow: 0 10px 30px rgba(92, 74, 67, 0.05);
            border: 4px solid var(--primary-pink);
        }
        .error-msg {
            color: #c65911;
            background-color: #fce4d6;
            padding: 10px;
            border-radius: 8px;
            font-size: 0.85rem;
            margin-bottom: 15px;
        }
    </style>
</head>
<body>

<div class="login-card">
    <h1 style="font-size: 2.2rem; margin-bottom: 5px;">Добро пожаловать</h1>
    <p style="font-family: 'Playfair Display', serif; font-style: italic; margin-bottom: 25px;">на свадебный сайт Дениса и Марии</p>

    <!-- Вывод ошибки, если введен неверный пароль/логин -->
    <div th:if="${param.error}" class="error-msg">
        Неверный логин или пароль. Пожалуйста, проверьте пригласительный билет.
    </div>

    <!-- Форма отправляет данные на встроенный обработчик Spring Security -->
    <form th:action="@{/login}" method="post">
        <div>
            <!-- Добавлен класс class="login-input" -->
            <input type="text" name="username" class="login-input" placeholder="Имя пользователя" required style="margin-bottom: 15px;">
        </div>
        <div>
            <!-- Добавлен класс class="login-input" -->
            <input type="password" name="password" class="login-input" placeholder="Пароль" required style="margin-bottom: 15px;">
        </div>
        <button type="submit" style="margin-top: 5px;">Войти</button>
    </form>
</div>

</body>
</html>
